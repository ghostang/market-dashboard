name: Update and deploy real-source dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python tests/test_fetch_dashboard_data.py -v
      - name: Fetch real-source dashboard JSON
        run: python scripts/fetch_dashboard_data.py --out public/data/dashboard.json
      - name: Guard against mock data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d=json.loads(Path('public/data/dashboard.json').read_text(encoding='utf-8'))
          if d.get('mock_data') is not False:
              raise SystemExit('mock_data must be false')
          bad=[s for s in d.get('source_status',[]) if s.get('source_type')=='mock']
          if bad:
              raise SystemExit(f'mock source rows found: {bad}')
          ok=sum(1 for c in d.get('market_cards',[]) if c.get('refresh_status')=='ok')
          if ok < 8:
              raise SystemExit(f'too few ok market cards: {ok}')
          themes=d.get('value_chain',{}).get('themes',[])
          if len(themes) != 4 or any(t.get('refresh_status') != 'ok' for t in themes):
              raise SystemExit(f'value chain themes not all ok: {themes}')
          sources={s.get('source_key'): s.get('refresh_status') for s in d.get('favorite_sources',{}).get('sources',[])}
          if sources.get('shuka_world') != 'ok':
              raise SystemExit(f'ShukaWorld RSS not ok: {sources}')
          print(f'mock guard ok; ok market cards={ok}; value_chain_themes={len(themes)}; favorite_sources={sources}')
          PY
      - name: Commit updated generated data
        run: |
          if git diff --quiet -- public/data/dashboard.json; then
            echo 'No dashboard data changes.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add public/data/dashboard.json
            git commit -m 'data: update real-source dashboard snapshot'
            git push
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Upload static Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
